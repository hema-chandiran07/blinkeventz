events {
  worker_connections 1024;
}

http {
  upstream api {
    server nearzro-api:3000;
  }

  upstream frontend {
    server nearzro-frontend:3000;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS in production
    # Uncomment below and remove the location blocks when SSL is ready
    # return 301 https://$host$request_uri;

    # API routes
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # WebSocket support for notifications
    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (bypass rate limit)
    location /health {
      proxy_pass http://api;
      proxy_set_header Host $host;
    }

    # Frontend (all other routes)
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # Uncomment for HTTPS in production
  # server {
  #   listen 443 ssl;
  #   server_name yourdomain.com;
  #   ssl_certificate /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ... same location blocks as above
  # }
}